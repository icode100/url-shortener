spring.application.name=url-shortener
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/url-shortener}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.flyway.enabled=false
shortener.sequence-query=SELECT NEXT VALUE FOR link_mapping_sequence
shortener.base-url=${SHORTENER_BASE_URL:http://localhost:8080}
spring.mvc.problemdetails.enabled=true
server.forward-headers-strategy=framework
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
info.app.name=${spring.application.name}
info.app.java.version=${java.version}
