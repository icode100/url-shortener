spring.datasource.url=${DATABASE_URL:jdbc:postgresql://postgres:5432/urlshortener}
spring.datasource.username=${DATABASE_USERNAME:urlshortener}
spring.datasource.password=${DATABASE_PASSWORD:urlshortener-dev}
spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/postgresql
shortener.sequence-query=SELECT nextval('link_mapping_sequence')
